name: Daily Heat News Collection

on:
  schedule:
    # Run daily at 06:30 UTC (12:00 noon IST)
    - cron: '30 6 * * *'
  workflow_dispatch:  # Allow manual trigger from Actions tab

concurrency:
  group: daily-collection
  cancel-in-progress: false  # Let running pipeline finish; queue new one

permissions:
  contents: write  # Required for git push with GITHUB_TOKEN

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 190  # 180 min pipeline + 10 min buffer for setup/commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        timeout-minutes: 180
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TIMEOUT_MINUTES: "175"  # 5 min less than step timeout for safety
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force output/
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "data: daily collection $(date -u +%Y-%m-%d)"
          # Retry push up to 3 times to handle concurrent pushes
          for attempt in 1 2 3; do
            if git push origin main 2>/dev/null; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt/3), rebasing on latest remote..."
            git fetch origin main
            if git rebase origin/main; then
              continue  # Rebase succeeded, retry push
            fi
            echo "Rebase conflict, resolving by keeping our output/ changes..."
            git checkout --theirs output/ 2>/dev/null || true
            git checkout --ours output/ 2>/dev/null || true
            git add output/
            git rebase --continue || git rebase --skip || true
          done
          echo "WARNING: Could not push after 3 attempts, but pipeline data was collected successfully"
          exit 0
